<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Name</title>
  <style>
    /* Base Design System - Design Tokens */
    :root {
      --text:          #3A4250;
      --accent:        #2563EB;
      --accent-hover:  #1D4FD7;
      --accent-2:      #F59E0B;
      --ink:           #141A22;
      --muted:         #6B7280;
      --border:        #E4E7EC;
      --border-light:  #EEF0F3;
      --surface:       #F7F8FA;
      --card:          #FFFFFF;
      --success:       #16A34A;
      --info:          #0EA5E9;
      --error:         #DC2626;
      --warning:       #F59E0B;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --radius-sm: 6px;
      --radius-md: 8px;
      --shadow-card: 0 1px 3px rgba(20, 26, 34, 0.08);
      --shadow-raised: 0 4px 16px rgba(20, 26, 34, 0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--surface);
      color: var(--text);
      font-family: var(--font);
      font-size: 1rem;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* Typography */
    h1 { font-size: 2rem;     font-weight: 700; color: var(--ink); }
    h2 { font-size: 1.5rem;   font-weight: 600; color: var(--ink); }
    h3 { font-size: 1.125rem; font-weight: 600; color: var(--text); }
    p  { color: var(--text); }
    small, .caption { font-size: 0.875rem; color: var(--muted); }

    /* Navigation */
    nav {
      background: var(--ink);
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 32px;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      font-weight: 700;
      font-size: 1rem;
      color: var(--card);
      text-decoration: none;
      letter-spacing: 0.01em;
    }
    .nav-tag {
      font-size: 0.75rem;
      color: var(--accent-2);
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .nav-links { display: flex; gap: 24px; margin-left: auto; }
    .nav-links a {
      color: var(--border);
      text-decoration: none;
      font-size: 0.875rem;
    }
    .nav-links a:hover { color: var(--accent-2); }

    /* Top accent bar */
    .accent-bar {
      height: 3px;
      background: linear-gradient(90deg, #2563EB 0%, #0EA5E9 100%);
    }

    /* Page layout */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* Page header */
    .page-header {
      margin-bottom: 32px;
    }
    .page-header h1 { margin-bottom: 8px; }
    .page-header p  { color: var(--muted); font-size: 1.05rem; }

    /* Cards */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 24px;
      box-shadow: var(--shadow-card);
    }
    .card-raised { box-shadow: var(--shadow-raised); }
    .card + .card { margin-top: 16px; }
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    /* Grid */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    @media (max-width: 768px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: background 0.15s, box-shadow 0.15s;
      white-space: nowrap;
    }
    .btn-primary   { background: var(--accent); color: var(--card); }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1.5px solid var(--border);
    }
    .btn-secondary:hover { background: var(--surface); }
    .btn-accent      { background: var(--accent-2); color: var(--ink); font-weight: 600; }
    .btn-accent:hover { background: #E08E08; }
    .btn:disabled  { opacity: 0.45; cursor: not-allowed; }
    .btn-sm { padding: 6px 14px; font-size: 0.85rem; }

    /* Forms */
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
    label { font-size: 0.875rem; font-weight: 500; color: var(--text); }
    input[type="text"],
    input[type="email"],
    input[type="search"],
    input[type="number"],
    select,
    textarea {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--font);
      font-size: 1rem;
      width: 100%;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      outline: none;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }
    textarea { resize: vertical; min-height: 100px; }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 500;
    }
    .badge-success { background: #E7F6EC; color: var(--success); border: 1px solid var(--success); }
    .badge-warning { background: #FEF3E2; color: #B5780B;        border: 1px solid var(--warning); }
    .badge-error   { background: #FCEBEB; color: var(--error);   border: 1px solid var(--error); }
    .badge-info    { background: #E6F6FE; color: #0284C7;        border: 1px solid var(--info); }
    .badge-neutral { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }

    /* Dividers */
    hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
    }
    .empty-state p { font-size: 0.95rem; margin-top: 8px; }

    /* Utility */
    .flex         { display: flex; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .flex-end     { display: flex; justify-content: flex-end; }
    .gap-8        { gap: 8px; }
    .gap-16       { gap: 16px; }
    .mt-8         { margin-top: 8px; }
    .mt-16        { margin-top: 16px; }
    .mt-24        { margin-top: 24px; }
    .mb-16        { margin-bottom: 16px; }
    .mb-24        { margin-bottom: 24px; }
    .text-muted   { color: var(--muted); }
    .text-small   { font-size: 0.875rem; }
    .w-full       { width: 100%; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text); }
  </style>
</head>
